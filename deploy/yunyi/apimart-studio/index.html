<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>生图工作台</title>
<style>
  :root{
    --bg:#f4f3ee; --panel:#ffffff; --line:#e6e3d9; --line2:#efece3;
    --fg:#1f1e1b; --mut:#73706a; --acc:#c96442; --acc2:#b5573a; --soft:#f0eee6;
    --shadow:0 1px 2px rgba(40,36,28,.04),0 4px 16px rgba(40,36,28,.04);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI","PingFang SC",Roboto,sans-serif;
    background:var(--bg);color:var(--fg);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  .hidden{display:none!important;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:#dcd9cd;border-radius:6px;border:2px solid var(--bg);}

  /* 登录 */
  #login{max-width:380px;margin:13vh auto;padding:34px 30px;background:var(--panel);
    border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);}
  #login .logo{font-size:26px;}
  #login h1{font-size:21px;margin:10px 0 4px;font-weight:600;}
  #login p{color:var(--mut);margin:0 0 22px;font-size:13px;}
  #login input{width:100%;padding:12px 14px;margin-bottom:12px;background:var(--soft);
    border:1px solid var(--line);border-radius:11px;color:var(--fg);font-size:14px;outline:none;}
  #login input:focus{border-color:var(--acc);background:#fff;}
  #login button{width:100%;padding:12px;background:var(--acc);color:#fff;border-radius:11px;font-size:15px;font-weight:600;}
  #login button:hover{background:var(--acc2);}
  #loginErr{color:#c0392b;font-size:13px;min-height:18px;margin-bottom:6px;}

  /* 框架 */
  header{display:flex;align-items:center;justify-content:space-between;padding:14px 26px;
    border-bottom:1px solid var(--line);background:rgba(244,243,238,.85);backdrop-filter:blur(8px);
    position:sticky;top:0;z-index:20;}
  header .brand{display:flex;align-items:center;gap:9px;font-weight:600;font-size:15.5px;}
  header .brand .dot{width:22px;height:22px;border-radius:7px;background:var(--acc);display:grid;place-items:center;font-size:13px;}
  header .right{display:flex;align-items:center;gap:14px;color:var(--mut);font-size:13px;}
  header .right button{color:var(--mut);font-size:13px;}
  header .right button:hover{color:var(--acc);}

  main{display:grid;grid-template-columns:372px 1fr;gap:26px;max-width:1500px;margin:0 auto;padding:26px;align-items:start;}
  .panel{position:sticky;top:84px;background:var(--panel);border:1px solid var(--line);
    border-radius:18px;padding:20px;box-shadow:var(--shadow);}
  .lab{font-size:12px;font-weight:600;color:var(--mut);letter-spacing:.3px;margin:18px 0 8px;}
  .lab:first-child{margin-top:0;}

  /* 模型选择 */
  .models{display:flex;flex-direction:column;gap:8px;}
  .mcard{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1px solid var(--line);
    border-radius:12px;background:var(--soft);text-align:left;transition:.12s;}
  .mcard:hover{border-color:#d8d3c4;}
  .mcard.on{border-color:var(--acc);background:#fbf2ee;}
  .mcard .nm{font-weight:600;font-size:13.5px;}
  .mcard .tg{font-size:11px;color:var(--mut);margin-top:1px;}
  .mcard .rad{margin-left:auto;width:16px;height:16px;border-radius:50%;border:1.5px solid #cdc8b9;flex:none;}
  .mcard.on .rad{border-color:var(--acc);background:radial-gradient(circle at center,var(--acc) 0 5px,transparent 6px);}

  textarea{width:100%;background:var(--soft);border:1px solid var(--line);border-radius:12px;color:var(--fg);
    padding:12px;font-size:14px;resize:vertical;min-height:104px;outline:none;font-family:inherit;}
  textarea:focus{border-color:var(--acc);background:#fff;}

  /* 参考图 */
  .drop{border:1.5px dashed #d6d1c1;border-radius:12px;padding:14px;text-align:center;color:var(--mut);
    font-size:12.5px;background:var(--soft);cursor:pointer;transition:.12s;}
  .drop:hover,.drop.over{border-color:var(--acc);background:#fbf2ee;color:var(--acc);}
  #thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  #thumbs .t{position:relative;}
  #thumbs img{width:56px;height:56px;object-fit:cover;border-radius:9px;border:1px solid var(--line);}
  #thumbs .x{position:absolute;top:-7px;right:-7px;background:#1f1e1b;color:#fff;border-radius:50%;
    width:19px;height:19px;font-size:12px;line-height:19px;text-align:center;}

  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{display:flex;align-items:center;gap:6px;padding:7px 12px;border:1px solid var(--line);
    border-radius:10px;background:var(--soft);color:var(--fg);font-size:12.5px;transition:.12s;}
  .chip:hover{border-color:#d8d3c4;}
  .chip.on{background:var(--acc);border-color:var(--acc);color:#fff;}
  .chip .rect{border:1.5px solid currentColor;border-radius:2px;opacity:.8;}

  #genBtn{width:100%;margin-top:20px;padding:13px;background:var(--acc);color:#fff;border-radius:12px;
    font-size:15px;font-weight:600;box-shadow:0 2px 8px rgba(201,100,66,.25);transition:.12s;}
  #genBtn:hover{background:var(--acc2);}
  #genBtn:active{transform:translateY(1px);}
  .hint{font-size:11.5px;color:var(--mut);text-align:center;margin-top:9px;}

  /* 画廊瀑布流 */
  .feedHead{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;}
  .feedHead h2{font-size:16px;font-weight:600;margin:0;}
  .feedHead span{color:var(--mut);font-size:12.5px;}
  .gallery{columns:4 230px;column-gap:16px;}
  .tile{break-inside:avoid;margin:0 0 16px;border-radius:15px;overflow:hidden;position:relative;
    background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow);}
  .tile img{width:100%;display:block;cursor:zoom-in;}
  .tile .ov{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;
    padding:11px;background:linear-gradient(to top,rgba(20,17,12,.78),rgba(20,17,12,.15) 45%,transparent 70%);
    opacity:0;transition:opacity .15s;}
  .tile:hover .ov{opacity:1;}
  .tile .ovpr{color:#fff;font-size:12px;line-height:1.4;margin-bottom:9px;display:-webkit-box;
    -webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .tile .ovbar{display:flex;gap:7px;}
  .tile .ib{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.16);backdrop-filter:blur(4px);
    color:#fff;display:grid;place-items:center;font-size:14px;text-decoration:none;border:none;}
  .tile .ib:hover{background:var(--acc);}
  .tile .badge{position:absolute;top:9px;left:9px;font-size:10.5px;color:#fff;background:rgba(20,17,12,.5);
    backdrop-filter:blur(4px);padding:2px 8px;border-radius:7px;opacity:0;transition:.15s;}
  .tile:hover .badge{opacity:1;}
  .tile.run{background:linear-gradient(100deg,#efece3 30%,#f7f5ef 50%,#efece3 70%);background-size:200% 100%;
    animation:sh 1.3s infinite;display:grid;place-items:center;color:var(--mut);font-size:13px;min-height:150px;}
  .tile.err{padding:16px;color:#c0392b;font-size:12.5px;}
  @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .empty{color:var(--mut);text-align:center;padding:70px 0;font-size:14px;}
  .empty .big{font-size:38px;margin-bottom:12px;opacity:.55;}

  #viewer{position:fixed;inset:0;background:rgba(28,25,20,.88);display:flex;align-items:center;justify-content:center;z-index:60;cursor:zoom-out;}
  #viewer img{max-width:92vw;max-height:92vh;border-radius:8px;}
  @media(max-width:880px){ main{grid-template-columns:1fr;} .panel{position:static;} }
</style>
</head>
<body>

<div id="login">
  <div class="logo">🎨</div>
  <h1>生图工作台</h1>
  <p>使用你的 LibreChat 账号登录</p>
  <div id="loginErr"></div>
  <input id="email" type="email" placeholder="邮箱" autocomplete="username">
  <input id="password" type="password" placeholder="密码" autocomplete="current-password">
  <button onclick="doLogin()">登录</button>
</div>

<div id="app" class="hidden">
  <header>
    <div class="brand"><span class="dot">🎨</span> 生图工作台</div>
    <div class="right"><span id="who"></span><button onclick="doLogout()">退出</button></div>
  </header>
  <main>
    <div class="panel">
      <div class="lab">模型</div>
      <div class="models" id="models"></div>

      <div class="lab">提示词</div>
      <textarea id="prompt" placeholder="描述你想要的图像，中英文均可…&#10;例：一只橘猫坐在窗台上，清晨柔光，电影感"></textarea>

      <div class="lab">参考图 <span style="font-weight:400;color:var(--mut)">（图生图，可选 · 三个模型都支持）</span></div>
      <div class="drop" id="drop">点击或拖拽图片到这里上传参考图</div>
      <input type="file" id="refFile" accept="image/*" multiple class="hidden">
      <div id="thumbs"></div>

      <div id="ratioWrap">
        <div class="lab">比例</div>
        <div class="chips" id="ratios"></div>
      </div>
      <div id="resWrap">
        <div class="lab">分辨率</div>
        <div class="chips" id="resChips"></div>
      </div>
      <div class="lab">张数</div>
      <div class="chips" id="counts"></div>

      <button id="genBtn" onclick="generate()">✨ 生成</button>
      <div class="hint">点击后即提交，无需等待，可继续生成</div>
    </div>

    <div>
      <div class="feedHead"><h2>作品</h2><span id="feedSub"></span></div>
      <div class="gallery" id="feed"></div>
    </div>
  </main>
</div>

<div id="viewer" class="hidden" onclick="this.classList.add('hidden')"><img id="viewerImg"></div>

<script>
let MODELS=[], feed=[], refImages=[];
let cur={model:null, size:'1:1', res:'1k', count:1};

async function api(path,opts={}){
  const r=await fetch(path,Object.assign({headers:{'Content-Type':'application/json'}},opts));
  if(r.status===401){ showLogin(); throw new Error('未登录'); }
  if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.detail||('HTTP '+r.status)); }
  return r.json();
}
function showLogin(){ app.classList.add('hidden'); login.classList.remove('hidden'); }

async function doLogin(){
  loginErr.textContent='';
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:email.value.trim(),password:password.value})});
    if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.detail||'登录失败'); }
    const d=await r.json(); enterApp(d.email);
  }catch(e){ loginErr.textContent=e.message; }
}
password.addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
async function doLogout(){ await fetch('/api/logout',{method:'POST'}); location.reload(); }

async function enterApp(em){
  login.classList.add('hidden'); app.classList.remove('hidden'); who.textContent=em;
  const d=await api('/api/models'); MODELS=d.models; cur.model=MODELS[0].id;
  renderModels(); renderModelOpts(); renderCounts();
  await loadHistory();
}

function renderModels(){
  models.innerHTML=MODELS.map(m=>`<button class="mcard ${m.id===cur.model?'on':''}" onclick="pickModel('${m.id}')">
    <div><div class="nm">${m.name}</div><div class="tg">${m.tag||''}</div></div><div class="rad"></div></button>`).join('');
}
function pickModel(id){ cur.model=id; renderModels(); renderModelOpts(); }
function curM(){ return MODELS.find(m=>m.id===cur.model); }

function ratioRect(r){
  if(r==='auto') return '<span class="rect" style="width:13px;height:13px;border-style:dashed"></span>';
  const [a,b]=r.split(':').map(Number); const max=15; let w,h;
  if(a>=b){ w=max; h=Math.round(max*b/a);} else { h=max; w=Math.round(max*a/b);}
  return `<span class="rect" style="width:${w}px;height:${h}px"></span>`;
}
function renderModelOpts(){
  const m=curM();
  if(!m.ratios.includes(cur.size)) cur.size=m.ratios[0];
  ratios.innerHTML=m.ratios.map(r=>`<button class="chip ${r===cur.size?'on':''}" onclick="cur.size='${r}';renderModelOpts()">${ratioRect(r)}${r}</button>`).join('');
  if(m.res.length){ resWrap.classList.remove('hidden');
    if(!m.res.includes(cur.res)) cur.res=m.res.includes('1k')?'1k':m.res[0];
    resChips.innerHTML=m.res.map(r=>`<button class="chip ${r===cur.res?'on':''}" onclick="cur.res='${r}';renderModelOpts()">${r}</button>`).join('');
  } else resWrap.classList.add('hidden');
}
function renderCounts(){
  counts.innerHTML=[1,2,3,4].map(n=>`<button class="chip ${n===cur.count?'on':''}" onclick="cur.count=${n};renderCounts()">${n}</button>`).join('');
}

/* 参考图：点击/拖拽 */
drop.onclick=()=>refFile.click();
refFile.onchange=e=>{ addFiles(e.target.files); e.target.value=''; };
['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('over');}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('over');}));
drop.addEventListener('drop',e=>{ if(e.dataTransfer.files.length) addFiles(e.dataTransfer.files); });
function addFiles(files){ [...files].forEach(f=>{ if(!f.type.startsWith('image/'))return; const rd=new FileReader();
  rd.onload=()=>{ refImages.push(rd.result); renderThumbs(); }; rd.readAsDataURL(f); }); }
function renderThumbs(){ thumbs.innerHTML=refImages.map((u,i)=>`<div class="t"><img src="${u}"><button class="x" onclick="refImages.splice(${i},1);renderThumbs()">×</button></div>`).join(''); }

/* 生成：提交即返回，不阻塞 */
async function generate(){
  const prompt=document.getElementById('prompt').value.trim();
  if(!prompt){ document.getElementById('prompt').focus(); return; }
  const m=curM();
  const body={model:m.id,prompt,size:cur.size,resolution:cur.res,count:cur.count,
              image_urls:refImages.slice()};
  const item={localId:'l'+Date.now()+Math.random(),status:'running',prompt,model:m.id,modelName:m.name,
              size:cur.size,t0:Date.now(),images:[],hasRef:refImages.length>0,n:cur.count};
  feed.unshift(item); renderFeed();
  try{
    const {job_id}=await api('/api/generate',{method:'POST',body:JSON.stringify(body)});
    item.job=job_id; pollJob(item);
  }catch(e){ item.status='error'; item.error=e.message; renderFeed(); }
}
async function pollJob(item){
  while(true){
    await new Promise(r=>setTimeout(r,3000));
    let j; try{ j=await api('/api/job/'+item.job); }catch(e){ continue; }
    if(j.status==='running') continue;
    if(j.status==='done'){ item.status='done'; item.images=j.result.images; item.elapsed=j.elapsed; }
    else { item.status='error'; item.error=j.error; }
    renderFeed(); break;
  }
}

async function loadHistory(){
  try{ const {items}=await api('/api/history');
    items.forEach(it=>feed.push({localId:it._id,status:'done',prompt:it.prompt,model:it.model,
      modelName:(MODELS.find(m=>m.id===it.model)||{}).name||it.model,size:it.size,images:it.images,created:it.created}));
    renderFeed();
  }catch(e){}
}

function esc(s){ return (s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }
function fileName(p){ return (p||'image').slice(0,18).replace(/[^\w一-龥]/g,'_'); }
function ratioCss(sz){ if(!sz||sz==='auto'||sz.includes('x'))return '1/1'; const p=sz.split(':'); return p.length===2?`${p[0]}/${p[1]}`:'1/1'; }

function renderFeed(){
  feedSub.textContent=feed.length?`共 ${feed.reduce((s,i)=>s+(i.status==='done'?i.images.length:1),0)} 张`:'';
  const g=document.getElementById('feed');
  if(!feed.length){ g.innerHTML='<div class="empty"><div class="big">🖼️</div>还没有作品。左侧填好提示词，点「生成」。</div>'; return; }
  let tiles=[];
  feed.forEach(it=>{
    if(it.status==='running'){
      for(let k=0;k<(it.n||1);k++) tiles.push(`<div class="tile run" style="aspect-ratio:${ratioCss(it.size)}">⏳ <span class="el" data-t0="${it.t0}">0s</span></div>`);
    } else if(it.status==='error'){
      tiles.push(`<div class="tile err">❌ ${esc(it.error||'生成失败')}<br><span style="color:var(--mut)">${esc(it.prompt)}</span></div>`);
    } else {
      const meta=JSON.stringify({prompt:it.prompt,model:it.model,size:it.size}).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
      it.images.forEach(u=>{
        tiles.push(`<div class="tile">
          <span class="badge">${esc(it.modelName||it.model)}${it.hasRef?' · 图生图':''}</span>
          <img src="${u}" onclick="view('${u}')">
          <div class="ov"><div class="ovpr">${esc(it.prompt)}</div>
            <div class="ovbar">
              <a class="ib" href="${u}" download="${fileName(it.prompt)}.png" title="下载">⬇</a>
              <button class="ib" onclick="useRef('${u}')" title="设为参考">🎯</button>
              <button class="ib" onclick='regen(${meta})' title="重新生成">🔄</button>
              <button class="ib" onclick="view('${u}')" title="放大">⛶</button>
            </div></div></div>`);
      });
    }
  });
  g.innerHTML=tiles.join('');
}
/* 运行中占位的秒数实时跳动 */
setInterval(()=>{ document.querySelectorAll('.el').forEach(el=>{ const t0=+el.dataset.t0; el.textContent=Math.round((Date.now()-t0)/1000)+'s'; }); },1000);

function view(u){ viewerImg.src=u; viewer.classList.remove('hidden'); }
async function useRef(u){
  try{ const r=await fetch(u); const b=await r.blob(); const rd=new FileReader();
    rd.onload=()=>{ refImages.push(rd.result); renderThumbs(); window.scrollTo({top:0,behavior:'smooth'}); };
    rd.readAsDataURL(b);
  }catch(e){ alert('设为参考失败'); }
}
function regen(it){ document.getElementById('prompt').value=it.prompt; cur.model=it.model; if(it.size)cur.size=it.size;
  renderModels(); renderModelOpts(); generate(); window.scrollTo({top:0,behavior:'smooth'}); }

(async()=>{ try{ const d=await fetch('/api/me'); if(d.ok){ const j=await d.json(); enterApp(j.email);} }catch(e){} })();
</script>
</body>
</html>
