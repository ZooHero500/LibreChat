<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>essjoy · AI 工作台</title>
<style>
  :root{ --bg:#f4f3ee; --panel:#fff; --line:#e6e3d9; --fg:#1f1e1b; --mut:#73706a; --acc:#c96442; --acc2:#b5573a; --soft:#f0eee6;
    --shadow:0 1px 2px rgba(40,36,28,.05),0 10px 30px rgba(40,36,28,.06); }
  *{box-sizing:border-box;} html,body{height:100%;margin:0;}
  body{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI","PingFang SC",Roboto,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,#faf6ef,var(--bg));color:var(--fg);
    display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;border:none;}
  .hidden{display:none!important;}
  .wrap{width:100%;max-width:460px;padding:24px;}
  .brand{text-align:center;margin-bottom:26px;}
  .brand .logo{width:54px;height:54px;border-radius:15px;background:var(--acc);display:inline-grid;place-items:center;font-size:27px;box-shadow:0 6px 18px rgba(201,100,66,.3);}
  .brand h1{font-size:23px;margin:14px 0 4px;font-weight:600;}
  .brand p{color:var(--mut);margin:0;font-size:14px;}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:28px;box-shadow:var(--shadow);}
  /* 登录 */
  #err{color:#c0392b;font-size:13px;min-height:18px;margin-bottom:8px;}
  label.f{display:block;font-size:12.5px;color:var(--mut);margin:0 0 6px;font-weight:600;}
  input[type=email],input[type=password]{width:100%;padding:12px 14px;margin-bottom:14px;background:var(--soft);
    border:1px solid var(--line);border-radius:11px;color:var(--fg);font-size:14.5px;outline:none;}
  input:focus{border-color:var(--acc);background:#fff;}
  .remember{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--mut);margin-bottom:18px;cursor:pointer;}
  .remember input{width:16px;height:16px;accent-color:var(--acc);}
  .sub{width:100%;padding:13px;background:var(--acc);color:#fff;border-radius:12px;font-size:15px;font-weight:600;box-shadow:0 2px 10px rgba(201,100,66,.28);}
  .sub:hover{background:var(--acc2);} .sub:disabled{opacity:.6;cursor:not-allowed;}

  /* 入口卡片 */
  .hello{text-align:center;margin-bottom:20px;}
  .hello .hi{font-size:17px;font-weight:600;} .hello .em{color:var(--mut);font-size:13px;margin-top:2px;}
  .entries{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .entry{display:flex;flex-direction:column;align-items:center;gap:10px;padding:26px 16px;border:1px solid var(--line);
    border-radius:16px;background:var(--soft);text-decoration:none;color:var(--fg);transition:.14s;}
  .entry:hover{border-color:var(--acc);background:#fbf2ee;transform:translateY(-2px);box-shadow:var(--shadow);}
  .entry .ico{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;font-size:26px;background:#fff;border:1px solid var(--line);}
  .entry .t{font-weight:600;font-size:15px;} .entry .d{font-size:12px;color:var(--mut);text-align:center;}
  .logout{display:block;text-align:center;margin-top:18px;color:var(--mut);font-size:13px;background:none;width:100%;text-decoration:underline;}
  .foot{text-align:center;color:var(--mut);font-size:12px;margin-top:20px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="logo">✦</div>
    <h1>essjoy · AI 工作台</h1>
    <p>电商团队的对话与生图平台</p>
  </div>

  <!-- 登录 -->
  <div class="card" id="loginCard">
    <div id="err"></div>
    <form id="loginForm" autocomplete="on">
      <label class="f">邮箱</label>
      <input id="email" type="email" name="email" placeholder="you@essjoy.com" autocomplete="username" required>
      <label class="f">密码</label>
      <input id="password" type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
      <label class="remember"><input type="checkbox" id="remember" checked> 记住我（30 天内免登）</label>
      <button class="sub" id="loginBtn" type="submit">登录</button>
    </form>
  </div>

  <!-- 入口 -->
  <div class="card hidden" id="homeCard">
    <div class="hello"><div class="hi">欢迎回来 👋</div><div class="em" id="meEmail"></div></div>
    <div class="entries">
      <a class="entry" href="https://chat.essjoy.com">
        <div class="ico">💬</div><div class="t">对话</div><div class="d">AI 助手 · 电商智能体</div>
      </a>
      <a class="entry" href="https://draw.essjoy.com">
        <div class="ico">🎨</div><div class="t">生图</div><div class="d">AI 出图工作台</div>
      </a>
    </div>
    <button class="logout" onclick="logout()">退出登录</button>
  </div>

  <div class="foot">已登录后，进入对话 / 生图无需再次登录</div>
</div>

<script>
const $=id=>document.getElementById(id);
async function showHome(email){ $('loginCard').classList.add('hidden'); $('homeCard').classList.remove('hidden'); $('meEmail').textContent=email||''; }
function showLogin(){ $('homeCard').classList.add('hidden'); $('loginCard').classList.remove('hidden'); }

$('loginForm').addEventListener('submit', async e=>{
  e.preventDefault();
  $('err').textContent='';
  const btn=$('loginBtn'); btn.disabled=true; btn.textContent='登录中…';
  try{
    const r=await fetch('/api/portal-login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:$('email').value.trim(),password:$('password').value,remember:$('remember').checked})});
    if(!r.ok){ const x=await r.json().catch(()=>({})); throw new Error(x.detail||'登录失败'); }
    const d=await r.json();
    showHome(d.email);
  }catch(e){ $('err').textContent=e.message; }
  finally{ btn.disabled=false; btn.textContent='登录'; }
});

async function logout(){ await fetch('/api/logout',{method:'POST'}); showLogin(); }

// 启动：已登录则直接显示入口
(async()=>{ try{ const r=await fetch('/api/me'); if(r.ok){ const j=await r.json(); showHome(j.email); } }catch(e){} })();
</script>
</body>
</html>
